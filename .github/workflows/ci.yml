name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      # Live dry quote against the real 1Click API (no secret). The authenticated
      # tier (test:live:auth) is intentionally not run in CI — no JWT on the runner.
      - run: npm run test:live:noauth
