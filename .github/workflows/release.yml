name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    environment: npm-publish
    permissions:
      id-token: write # npm OIDC trusted publishing + provenance
      contents: read # checkout only; git/PR writes use the bot token
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate as Move Industries Bot
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        id: authenticate
        with:
          app-id: ${{ vars.MOVE_INDUSTRIES_BOT_APP_ID }}
          private-key: ${{ secrets.MOVE_INDUSTRIES_BOT_APP_PRIVATE_KEY }}

      - name: Checkout Repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@11.18.0

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: npm run publish-packages
        env:
          GITHUB_TOKEN: ${{ steps.authenticate.outputs.token }}
          NPM_CONFIG_PROVENANCE: true
